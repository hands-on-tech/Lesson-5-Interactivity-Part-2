<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <title>Interactivity Lab - APIs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main id="app-container">
        <h1>API Playground</h1>

        <section class="api-box">
            <h2>Inspiration Engine</h2>
            <p id="quote-text">Click the button below to get a quote...</p>
            <button id="quote-btn">Fetch Quote</button>
        </section>

        <hr>

        <section class="api-box">
            <h2>Life Advice</h2>
            <p id="advice-text">Need some help? Get some advice!</p>
            <button id="advice-btn">Fetch Advice</button>
        </section>

        <hr>

        <section id="weather-box" class="api-box">
            <h2>Manchester Weather</h2>
            <p id="weather-text">Is it raining in Manchester? Check the temperature!</p>
            <button id="weather-btn">Check Weather</button>
        </section>
    </main>

    </body>
</html>
